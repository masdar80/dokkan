name: dokkan
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  provider: ^6.1.2
  sqflite: ^2.3.3+3
  path: ^1.9.0
  http: ^1.2.1
  html: ^0.15.6
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  pdf: ^3.11.1
  printing: ^5.13.2
  file_picker: ^8.0.3
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
